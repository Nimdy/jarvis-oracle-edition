\* TLC config for phase_65.tla

SPECIFICATION Spec

CONSTANTS
  MAX_APPROVALS = 4
  MAX_AUDIT_LEN = 8

\* Bounded exploration. clock is incremented by every action, so this
\* keeps the reachable state space finite without flagging a TypeOK
\* violation when the bound is hit.
CONSTRAINT
  StateBound

\* Safety invariants to check exhaustively.
INVARIANTS
  TypeOK
  NoAutoPromotion
  AttestationImmutability
  RequestOkDerivationInv
  SafetyInvariants

\* Liveness property is bounded by the clock and disabled by default.
\* PROPERTIES
\*   RequestTerminates
