<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS · Brain Universe</title>
  <link rel="stylesheet" href="/static/v2/v2.css">
  <style>
    html,body{height:100%;margin:0;background:#02030a;overflow:hidden;}
    #wrap{position:fixed;inset:0;overflow:hidden;}
    #sky{position:absolute;inset:0;display:block;cursor:grab;}
    #hud{position:absolute;top:10px;left:12px;font-size:11px;color:var(--muted);z-index:5;pointer-events:none;}
    #hud h1{font-size:13px;letter-spacing:.18em;color:var(--text);margin:0 0 4px;font-weight:700;}
    #hud .sub{font-size:10px;color:var(--dim);max-width:340px;line-height:1.4;}
    #hud .stat{margin-top:8px;font-variant-numeric:tabular-nums;} #hud .stat b{color:var(--cyan);}
    #legend{position:absolute;top:10px;right:12px;font-size:9.5px;color:var(--muted);z-index:5;text-align:right;pointer-events:none;line-height:1.5;}
    #legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:6px;vertical-align:middle;}
    #legend .ln{display:inline-block;width:16px;height:0;border-top:2px solid;margin-left:6px;vertical-align:middle;}
    #ctl{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:6px;}
    #ctl button{background:rgba(3,8,14,.8);border:1px solid var(--line);color:var(--muted);border-radius:5px;font-size:11px;padding:4px 11px;cursor:pointer;font-family:inherit;}
    #ctl button.on{border-color:var(--cyan);color:var(--cyan);}
    #tip{position:absolute;z-index:7;background:rgba(3,8,14,.95);border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:10.5px;color:var(--text);max-width:320px;display:none;pointer-events:none;}
    #tip .k{color:var(--cyan);font-weight:700;} #tip .m{color:var(--muted);margin-top:3px;} #tip .st{font-size:9px;letter-spacing:.07em;text-transform:uppercase;}
    #tip .dev{color:var(--red);font-weight:700;}
    .navback{position:absolute;bottom:12px;right:12px;z-index:6;font-size:10px;}
    .navback a{color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:4px;padding:3px 8px;margin-left:4px;background:rgba(3,8,14,.7);}
    #prov{position:absolute;bottom:12px;left:12px;font-size:10px;color:var(--muted);z-index:5;pointer-events:none;border-left:2px solid var(--line);padding-left:8px;} #prov b{color:var(--cyan);font-variant-numeric:tabular-nums;}
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="sky"></canvas>
    <div id="hud">
      <h1>JARVIS · BRAIN UNIVERSE</h1>
      <div class="sub">The live connectome (the Super-Synapse), tapped one-way from the running system. White tracts = real signal paths; <em>lit = fired now</em>. Subscriber side is live; <em>emitter side is code-derived</em> (dashed = unknown origin, never guessed). Motion = real signals only.</div>
      <div class="stat" id="counts">—</div>
    </div>
    <div id="ctl">
      <button id="btnFreeze">⏸ freeze</button>
      <button id="btnFlow" class="on">⚡ live signals</button>
      <button id="btnDev">⚠ deviations</button>
    </div>
    <div id="legend"></div>
    <div id="prov"></div>
    <div id="tip"></div>
    <div class="navback"><a href="/static/v2/nnfleet.html">fleet</a><a href="/static/v2/cockpit.html">← v2</a></div>
  </div>

  <script>
  const cv=document.getElementById('sky'), ctx=cv.getContext('2d');
  let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize); resize();

  const cam={x:0,y:0,s:0.7}; let drag=null;
  cv.addEventListener('wheel',e=>{e.preventDefault();const f=Math.exp(-e.deltaY*0.0012);cam.x=e.clientX-(e.clientX-cam.x)*f;cam.y=e.clientY-(e.clientY-cam.y)*f;cam.s*=f;},{passive:false});
  cv.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y};cv.style.cursor='grabbing';});
  addEventListener('mouseup',()=>{drag=null;cv.style.cursor='grab';});
  addEventListener('mousemove',e=>{ if(drag){cam.x=drag.cx+(e.clientX-drag.x);cam.y=drag.cy+(e.clientY-drag.y);} else hover(e); });
  cv.addEventListener('dblclick',()=>{cam.x=0;cam.y=0;cam.s=0.7;});
  const toScreen=p=>({x:p.x*cam.s+cam.x+W/2, y:p.y*cam.s+cam.y+H/2});

  const COL={'teacher':'#c061ff','live-earning':'#00ff99','earning':'#00ccff','training':'#ffd24a',
    'shadow':'#3f7fbf','advisory':'#ffb000','dormant':'#5a6470','staged':'#7a6fb0','unknown':'#46505c'};
  function nodeColor(n){
    if(n.kind==='kernel') return '#eaf6ff';
    if(n.kind==='baseline') return '#c061ff';
    if(showDev && n.deviation==='DEVIATION') return '#ff3b5c';
    if(n.state) return COL[n.state]||'#9fb0c0';
    return '#4f6f8c';
  }

  let nodes=[], edges=[], byId={}, evIndex={}, clusterAngle={}, stars=[];
  let settled=false, settleT=0, frozen=false, flow=true, showDev=true;
  const pulses=[]; const now=()=>performance.now();
  const MAXS=12;

  function seedStars(){stars=[];for(let i=0;i<320;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random()*.4+.07});}
  seedStars();

  function clusterOf(n){ return n.family || (n.design&&n.design.area) || n.kind || 'other'; }
  function prepEdge(e,i){ e._base=Math.max(2,Math.round(2+Math.min(1,(e.count||0)/40)*4)); e._strands=[];
    let s=i*131+7; const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
    for(let k=0;k<MAXS;k++)e._strands.push({off:(k-(MAXS-1)/2)*(1.8+r()*1.5),bow:(r()-0.5)*0.5});
    if(e.flow==null)e.flow=e.fired?0.6:0; }

  function layoutInit(){
    const cl=[...new Set(nodes.filter(n=>n.kind!=='kernel'&&n.kind!=='baseline').map(clusterOf))];
    cl.forEach((c,i)=>clusterAngle[c]=(i/cl.length)*Math.PI*2);
    nodes.forEach(n=>{ if(n.kind==='kernel'){n.x=0;n.y=0;return;}
      if(n.x==null){const a=clusterAngle[clusterOf(n)]||Math.random()*6.28, R=(n.kind==='baseline'?120:260+Math.random()*180);
        n.x=Math.cos(a)*R+(Math.random()-.5)*140; n.y=Math.sin(a)*R+(Math.random()-.5)*140; n.vx=0;n.vy=0;}});
    settled=false; settleT=now();
  }

  function step(){
    const cen={}; nodes.forEach(n=>{if(n.kind==='kernel')return;const c=clusterOf(n);(cen[c]=cen[c]||{x:0,y:0,n:0});cen[c].x+=n.x;cen[c].y+=n.y;cen[c].n++;});
    for(const f in cen){cen[f].x/=cen[f].n;cen[f].y/=cen[f].n;}
    let ke=0;
    for(let i=0;i<nodes.length;i++){const a=nodes[i];if(a.kind==='kernel'){a.x=0;a.y=0;continue;}
      let fx=0,fy=0;
      for(let j=0;j<nodes.length;j++){if(i===j)continue;const b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+0.01;if(d2<70000){const f=300/d2;fx+=dx*f;fy+=dy*f;}}
      const c=cen[clusterOf(a)]; if(c){fx+=(c.x-a.x)*0.006;fy+=(c.y-a.y)*0.006;}
      fx+=(-a.x)*0.0010; fy+=(-a.y)*0.0010;
      a.vx=(a.vx+fx)*0.84; a.vy=(a.vy+fy)*0.84;
      a.x+=Math.max(-7,Math.min(7,a.vx)); a.y+=Math.max(-7,Math.min(7,a.vy)); ke+=a.vx*a.vx+a.vy*a.vy;
    }
    edges.forEach(e=>{const a=byId[e.source],b=byId[e.target];if(!a||!b)return;let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;const k=(d-300)*0.0008;
      if(a.kind!=='kernel'){a.vx+=dx/d*k;a.vy+=dy/d*k;} if(b.kind!=='kernel'){b.vx-=dx/d*k;b.vy-=dy/d*k;}});
    if(ke<0.5 || now()-settleT>5000) settled=true;
  }

  function edgePt(e,tt){const a=byId[e.source],b=byId[e.target];const pa=toScreen(a),pb=toScreen(b);
    const mx=(pa.x+pb.x)/2+(pb.y-pa.y)*0.07,my=(pa.y+pb.y)/2-(pb.x-pa.x)*0.07,u=1-tt;
    return {x:u*u*pa.x+2*u*tt*mx+tt*tt*pb.x,y:u*u*pa.y+2*u*tt*my+tt*tt*pb.y};}

  function draw(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#02030a';ctx.fillRect(0,0,W,H);
    for(const s of stars){ctx.globalAlpha=s.a;ctx.fillStyle='#7fa8ff';ctx.fillRect(s.x,s.y,s.r,s.r);}ctx.globalAlpha=1;
    const t=now();
    ctx.globalCompositeOperation='lighter';
    edges.forEach(e=>{const a=byId[e.source],b=byId[e.target];if(!a||!b||!e._strands)return;
      const pa=toScreen(a),pb=toScreen(b),dx=pb.x-pa.x,dy=pb.y-pa.y,len=Math.hypot(dx,dy)||1,px=-dy/len,py=dx/len;
      const unk=e.provenance==='RELAYED_UNKNOWN', fl=e.flow||0;
      if(unk){ // unknown emitter: faint dashed grey, no bundle (honesty)
        ctx.strokeStyle='rgba(120,130,150,'+(0.05+fl*0.25).toFixed(3)+')';ctx.lineWidth=Math.max(0.4,(0.6+fl)*cam.s);ctx.setLineDash([4,5]);
        ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();ctx.setLineDash([]);return;
      }
      const n=Math.min(MAXS,e._base+Math.round(fl*8)), al=0.04+fl*0.12;
      const base = fl>0.18 ? 'rgba(170,245,255,' : 'rgba(215,235,255,';
      for(let i=0;i<n;i++){const sd=e._strands[i],o=sd.off*cam.s;
        const mx=(pa.x+pb.x)/2+px*o+(pb.y-pa.y)*0.05*sd.bow,my=(pa.y+pb.y)/2+py*o-(pb.x-pa.x)*0.05*sd.bow;
        ctx.strokeStyle=base+al.toFixed(3)+')';ctx.lineWidth=Math.max(0.35,(0.55+fl*0.8)*cam.s);
        ctx.beginPath();ctx.moveTo(pa.x+px*o,pa.y+py*o);ctx.quadraticCurveTo(mx,my,pb.x+px*o,pb.y+py*o);ctx.stroke();}
    });
    for(let i=pulses.length-1;i>=0;i--){const pu=pulses[i],age=(t-pu.t0)/850;if(age>=1){pulses.splice(i,1);continue;}
      const e=pu.edge;if(!byId[e.source]||!byId[e.target])continue;const pt=edgePt(e,age),r=(3-age*1.4)*cam.s;
      const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,r*4);g.addColorStop(0,pu.col);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x,pt.y,r*4,0,7);ctx.fill();}
    nodes.forEach(n=>{if(n.is_hub)return;const p=toScreen(n);const c=nodeColor(n);const rad=(n.kind==='kernel'?5:n.kind==='baseline'?3.6:1.7)*2.2*cam.s;
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rad*3);g.addColorStop(0,c+'cc');g.addColorStop(.4,c+'44');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,rad*3,0,7);ctx.fill();ctx.globalCompositeOperation='source-over';
      ctx.fillStyle='#02030a';ctx.beginPath();ctx.arc(p.x,p.y,rad,0,7);ctx.fill();
      ctx.strokeStyle=c;ctx.lineWidth=Math.max(0.7,1.2*cam.s);ctx.beginPath();ctx.arc(p.x,p.y,rad,0,7);ctx.stroke();
      if(n.kind==='kernel'){const ph=(Math.sin(t*0.0018)+1)/2;ctx.strokeStyle='rgba(234,246,255,'+(0.25+ph*0.35).toFixed(3)+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,rad*(1.5+ph*0.4),0,7);ctx.stroke();}
      if(showDev&&n.deviation==='DEVIATION'){ctx.strokeStyle='rgba(255,59,92,.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,rad+6*cam.s,0,7);ctx.stroke();}
      ctx.globalCompositeOperation='lighter';});
    ctx.globalCompositeOperation='source-over';
    if(cam.s>1.1){ctx.fillStyle='rgba(120,200,255,.8)';ctx.font='9px ui-monospace,monospace';
      nodes.forEach(n=>{if(n.is_hub)return;if(n.kind==='kernel'||n.kind==='baseline'||cam.s>1.9){const p=toScreen(n);ctx.fillText(n.label,p.x+(n.kind==='kernel'?14:6)*cam.s,p.y+3);}});}
  }
  function loop(){ if(!frozen){ if(!settled)step(); if(flow){for(const e of edges){if(e.flow>0.002)e.flow*=0.99;}} } draw(); requestAnimationFrame(loop); }

  function pulseEvent(type){ if(!flow||frozen)return; const es=evIndex[type]; if(!es||!es.length)return;
    for(const e of es){ e.flow=Math.min(1,(e.flow||0)+0.55);
      pulses.push({edge:e,t0:now(),col:e.provenance==='RELAYED_UNKNOWN'?'rgba(150,160,180,.8)':'rgba(150,235,255,.9)'}); }
    while(pulses.length>200)pulses.shift(); }

  function connectSSE(){ try{const es=new EventSource('/api/events/stream');
    es.onmessage=ev=>{try{const d=JSON.parse(ev.data);if(d&&d.type)pulseEvent(d.type);}catch(e){}};
    es.onerror=()=>{es.close();setTimeout(connectSSE,4000);};}catch(e){} }

  function hover(e){const tip=document.getElementById('tip');let best=null,bd=22;
    for(const n of nodes){if(n.is_hub)continue;const p=toScreen(n);const d=Math.hypot(p.x-e.clientX,p.y-e.clientY);if(d<bd){best=n;bd=d;}}
    if(best){const df=best.design||{};tip.style.display='block';tip.style.left=Math.min(W-330,e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';
      tip.innerHTML='<div class="k">'+best.label+'</div><div class="st" style="color:'+nodeColor(best)+'">'+(best.kind||'')+(best.state?' · '+best.state:'')+'</div>'+
        (best.deviation==='DEVIATION'?'<div class="dev">⚠ DEVIATION — designed live, currently quiet</div>':'')+
        (df.purpose?'<div class="m">'+df.purpose+'</div>':'')+
        (df.does?'<div class="m" style="color:var(--dim)">'+df.does+'</div>':'')+
        (df.status?'<div class="m">designed: '+df.status+' / '+(df.authority||'')+(df.expected_idle_state?' · idle-ok: '+df.expected_idle_state.slice(0,80):'')+'</div>':'')+
        (df?'<div class="m" style="color:var(--dim);font-size:9px">'+(df.provenance||'')+'</div>':'');
    } else tip.style.display='none';
  }

  function merge(d){
    const old={};nodes.forEach(n=>old[n.id]=n);const had=Object.keys(old).length>0;
    nodes=(d.nodes||[]).map(n=>{const o=old[n.id];if(o){Object.assign(o,n);return o;}return n;});
    byId={};nodes.forEach(n=>byId[n.id]=n);
    edges=(d.edges||[]);edges.forEach((e,i)=>prepEdge(e,i));
    evIndex={};edges.forEach(e=>{(evIndex[e.event]=evIndex[e.event]||[]).push(e);});
    if(!had)layoutInit(); else nodes.forEach(n=>{if(n.x==null){const a=clusterAngle[clusterOf(n)]||Math.random()*6.28;n.x=Math.cos(a)*320;n.y=Math.sin(a)*320;n.vx=0;n.vy=0;}});
    const c=d.counts||{};
    document.getElementById('counts').innerHTML='<b>'+(c.nodes||0)+'</b> nodes · <b>'+(c.edges||0)+'</b> connections · <b>'+(c.subscribed_event_types||0)+'</b> live event types';
    const dv=d.deviations||{};
    document.getElementById('prov').innerHTML='live tap · code-derived emitters · <b>'+(dv.DEVIATION||0)+'</b> deviations · '+(c.dynamic_emit_sites||0)+' unknown-origin sites';
    document.getElementById('legend').innerHTML=
      '<div>kernel<span class="dot" style="background:#eaf6ff"></span></div>'+
      '<div>baseline LLM<span class="dot" style="background:#c061ff"></span></div>'+
      '<div>live-earning<span class="dot" style="background:#00ff99"></span></div>'+
      '<div>training<span class="dot" style="background:#ffd24a"></span></div>'+
      '<div>shadow/subsystem<span class="dot" style="background:#3f7fbf"></span></div>'+
      '<div>deviation<span class="dot" style="background:#ff3b5c"></span></div>'+
      '<div style="margin-top:4px">live signal tract<span class="ln" style="border-color:#aaf5ff"></span></div>'+
      '<div>unknown-origin<span class="ln" style="border-color:#7882a0;border-top-style:dashed"></span></div>';
  }

  document.getElementById('btnFreeze').onclick=function(){frozen=!frozen;this.classList.toggle('on',frozen);this.textContent=frozen?'▶ resume':'⏸ freeze';};
  document.getElementById('btnFlow').onclick=function(){flow=!flow;this.classList.toggle('on',flow);if(!flow)pulses.length=0;};
  document.getElementById('btnDev').onclick=function(){showDev=!showDev;this.classList.toggle('on',showDev);};
  document.getElementById('btnDev').classList.add('on');

  async function poll(){try{const d=await(await fetch('/api/connectome')).json();if(d&&!d.error)merge(d);}catch(e){}}
  poll(); setInterval(poll,15000); connectSSE(); loop();
  </script>
</body>
</html>
